<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We are Launching Soon</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #b3b3b3; font-size: 1.1rem; }
        .subscribe-form {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        input[type="email"] {
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            width: 65%;
            outline: none;
        }
        button {
            padding: 12px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Something Awesome is Coming Soon</h1>
        <p>We are working hard to complete the site. Sign up to get notified when we launch!</p>
        
        <form id="subscribeForm" class="subscribe-form">
            <input type="email" id="emailInput" placeholder="Enter your email" required />
            <button type="submit">Notify Me</button>
        </form>

        <audio id="bgMusic" loop autoplay src="music.mp3"></audio>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="Firebase.js"></script>
</body>
</html>
