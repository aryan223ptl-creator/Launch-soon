<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPEHAUS | Launching Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    position:relative;
}

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
}

body::before{
    width:300px;
    height:300px;
    background:rgba(255,255,255,0.12);
    top:-100px;
    left:-100px;
    animation:move1 8s infinite alternate;
}

body::after{
    width:250px;
    height:250px;
    background:rgba(255,255,255,0.08);
    bottom:-80px;
    right:-80px;
    animation:move2 10s infinite alternate;
}

@keyframes move1{
from{transform:translate(0,0);}
to{transform:translate(180px,150px);}
}

@keyframes move2{
from{transform:translate(0,0);}
to{transform:translate(-180px,-150px);}
}

.container{
    position:relative;
    z-index:2;
    padding:20px;
}

h1{
    font-size:65px;
    letter-spacing:10px;
    font-weight:900;
}

p{
    margin-top:18px;
    color:#cfcfcf;
    font-size:20px;
}

.launch{
    margin-top:12px;
    color:#888;
    letter-spacing:5px;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 40px;
    border:2px solid #fff;
    color:#fff;
    text-decoration:none;
    border-radius:40px;
    transition:.3s;
    font-weight:bold;
}

.btn:hover{
    background:#fff;
    color:#000;
}

.handle{
    margin-top:18px;
    color:#999;
}

.note{
    margin-top:30px;
    font-size:13px;
    color:#666;
}

@media(max-width:768px){
h1{
font-size:42px;
letter-spacing:5px;
}
p{
font-size:16px;
}
}
</style>
</head>

<body>

<div class="container">
    <h1>HYPEHAUS</h1>
    <p>Something Big Is Coming.</p>
    <div class="launch">LAUNCHING SOON</div>

    <a class="btn" href="https://instagram.com/Hypehaus.store" target="_blank">
        Follow Us
    </a>

    <div class="handle">@Hypehaus.store</div>

    <div class="note">
        🎵 Double tap anywhere to Play / Pause music
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    music.play().catch(() => {
        document.body.addEventListener("click", () => {
            music.play();
        }, { once: true });
    });
});

let lastTap = 0;

document.addEventListener("touchend", function () {
    const currentTap = new Date().getTime();

    if (currentTap - lastTap < 300 && currentTap - lastTap > 0) {
        if (music.paused) {
            music.play();
        } else {
            music.pause();
        }
    }

    lastTap = currentTap;
});
</script>
<script type="module" src="firebase.js"></script>

  signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWuO_POHU2BwhmfFUVOz7LDL1QG4Rj318",
  authDomain: "hypehausstore-64d0a.firebaseapp.com",
  projectId: "hypehausstore-64d0a",
  storageBucket: "hypehausstore-64d0a.firebasestorage.app",
  messagingSenderId: "750047826891",
  appId: "1:750047826891:web:8d99ebdd47baa21b075c4e",
  measurementId: "G-CMG5BEGMEH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function () {
    try {
        const result = await signInWithPopup(auth, provider);
        alert("Welcome " + result.user.displayName);
    } catch (err) {
        alert(err.message);
    }
}

window.logout = async function () {
    await signOut(auth);
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        console.log("Logged in:", user.displayName);
    } else {
        console.log("No user logged in");
    }
});
</script>

<button onclick="googleLogin()">Continue with Google</button>

</body>
</html>
