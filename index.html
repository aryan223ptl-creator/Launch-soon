<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPEHAUS | Launching Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#333 0,#111 40%,#000 80%);
animation:zoom 8s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

.card{
position:relative;
z-index:2;
width:90%;
max-width:650px;
padding:50px 35px;
text-align:center;
backdrop-filter:blur(18px);
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
}

.logo{
font-size:40px;
font-weight:900;
letter-spacing:8px;
margin-bottom:20px;
}

.tag{
display:inline-block;
padding:8px 18px;
border:1px solid #fff;
border-radius:50px;
font-size:12px;
letter-spacing:3px;
margin-bottom:25px;
}

h1{
font-size:54px;
margin-bottom:15px;
}

p{
color:#bdbdbd;
line-height:1.8;
margin-bottom:35px;
}

form{
display:flex;
gap:12px;
flex-wrap:wrap;
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:50px;
font-size:15px;
}

button{
padding:16px 30px;
border:none;
border-radius:50px;
background:#fff;
color:#000;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#d9d9d9;
transform:translateY(-2px);
}

footer{
margin-top:30px;
font-size:13px;
color:#888;
}

@media(max-width:768px){

.logo{
font-size:28px;
letter-spacing:4px;
}

h1{
font-size:34px;
}

button{
width:100%;
}

}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="logo">HYPEHAUS</div>

<div class="tag">STREETWEAR • COMING SOON</div>

<h1>Launching Soon.</h1>

<p>
Premium streetwear crafted for those who never follow trends—they create them.
Join the waitlist and be the first to access our drop.
</p>

<form action="https://formsubmit.co/aryan223ptl@gmail.com" method="POST">

<input type="email"
name="Email"
placeholder="Enter your email"
required>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_subject" value="New HYPEHAUS Waitlist Signup">

<button>JOIN WAITLIST</button>

</form>

<footer>
© 2026 HYPEHAUS.STORE • ALL RIGHTS RESERVED
</footer>

</div>

</body>
</html>
