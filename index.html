<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NIKE DUNK LOW BLACK // DROP</title>
  <style>
    body { margin: 0; background: #08080c; color: #fff; font-family: 'Impact', sans-serif; overflow: hidden; }
    #hud { position: absolute; top: 20px; left: 20px; z-index: 10; letter-spacing: 2px; }
    #form-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; }
    input[type="email"] { padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
    button { padding: 12px 25px; border-radius: 25px; border: none; background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<div id="hud">SOUND: <span id="sound-status" style="color:#ff0055">OFF</span> (Click screen to toggle)</div>

<div id="form-container">
  <form action="https://formsubmit.co/aryan223ptl@gmail.com" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required />
    <button type="submit">NOTIFY ME ON DROP</button>
  </form>
</div>

<audio id="bg-music" src="music.mp3" loop></audio>

<script>
  const audio = document.getElementById('bg-music');
  const status = document.getElementById('sound-status');
  let isPlaying = false;

  window.addEventListener('click', () => {
    if (!isPlaying) {
      audio.play().then(() => {
        isPlaying = true;
        status.innerText = 'ON';
        status.style.color = '#00ffcc';
      }).catch(e => console.log('Audio autoplay blocked', e));
    } else {
      audio.pause();
      isPlaying = false;
      status.innerText = 'OFF';
      status.style.color = '#ff0055';
    }
  });
</script>
</body>
</html>
