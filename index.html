<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPEHAUS | Launching Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    text-align:center;
    position:relative;
}

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    animation:float 8s ease-in-out infinite alternate;
}

body::before{
    width:320px;
    height:320px;
    background:#ffffff12;
    top:-80px;
    left:-80px;
}

body::after{
    width:260px;
    height:260px;
    background:#ffffff08;
    bottom:-60px;
    right:-60px;
}

@keyframes float{
    from{transform:translate(0,0);}
    to{transform:translate(80px,60px);}
}

.container{
    z-index:2;
    padding:20px;
}

.logo{
    font-size:64px;
    font-weight:900;
    letter-spacing:10px;
}

.tagline{
    margin-top:18px;
    font-size:20px;
    color:#cfcfcf;
}

.launch{
    margin-top:12px;
    color:#888;
    letter-spacing:4px;
}

.instagram{
    display:inline-block;
    margin-top:40px;
    padding:16px 38px;
    border:2px solid #fff;
    border-radius:40px;
    text-decoration:none;
    color:#fff;
    font-weight:700;
    transition:.3s;
}

.instagram:hover{
    background:#fff;
    color:#000;
}

.handle{
    margin-top:20px;
    color:#aaa;
    font-size:18px;
}

@media(max-width:768px){
.logo{
font-size:42px;
letter-spacing:5px;
}
.tagline{
font-size:17px;
}
.handle{
font-size:16px;
}
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">HYPEHAUS</div>
    <div class="tagline">Something Huge Is Coming.</div>
    <div class="launch">LAUNCHING SOON</div>

    <a class="instagram" href="https://instagram.com/Hypehaus.store" target="_blank">
        Follow Us on Instagram
    </a>

    <div class="handle">@Hypehaus.store</div>
</div>

<audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

window.addEventListener("load", function () {
    music.play().catch(function () {
        document.body.addEventListener("click", function () {
            music.play();
        }, { once: true });
    });
});
</script>

</body>
</html>
